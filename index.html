<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Dado no Tabuleiro</title>

<style>
  body {
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    margin-top: 40px;
  }

  .board {
    display: grid;
    grid-template-columns: repeat(3, 100px);
    grid-template-rows: repeat(3, 100px);
    gap: 5px;
    position: relative;
  }

  .cell {
    border: 2px solid #333;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
  }

  .dice {
    width: 60px;
    height: 60px;
    background: #fff;
    border: 2px solid black;
    border-radius: 10px;
    position: absolute;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    transition: all 0.6s ease;
  }

  .controls {
    margin-top: 20px;
    text-align: center;
  }

  button {
    padding: 10px 15px;
    font-size: 16px;
    margin: 5px;
    cursor: pointer;
  }
</style>
</head>

<body>

<div>
  <div class="board" id="board"></div>

  <div class="controls">
    <button id="startBtn" onclick="start()">Iniciar movimento</button>
    <button onclick="reset()">Reset</button>
  </div>
</div>

<script>
  const board = document.getElementById("board");

  const cols = ["A", "B", "C"];
  const rows = [1, 2, 3];

  rows.forEach(r => {
    cols.forEach(c => {
      const cell = document.createElement("div");
      cell.className = "cell";
      cell.id = c + r;
      cell.innerText = c + r;
      board.appendChild(cell);
    });
  });

  const dice = document.createElement("div");
  dice.className = "dice";
  board.appendChild(dice);

  let running = false;

  // Caminho + topo esperado
  const steps = [
    { pos: "A2", top: 5 },
    { pos: "B2", top: 3 },
    { pos: "B1", top: 1 },
    { pos: "C1", top: 2 },
    { pos: "C2", top: 3 },
    { pos: "C3", top: 5 }
  ];

  function getCellPosition(cellId) {
    const cell = document.getElementById(cellId);
    const rect = cell.getBoundingClientRect();
    const boardRect = board.getBoundingClientRect();

    return {
      left: rect.left - boardRect.left + 20,
      top: rect.top - boardRect.top + 20
    };
  }

  function moveTo(cellId) {
    const pos = getCellPosition(cellId);
    dice.style.left = pos.left + "px";
    dice.style.top = pos.top + "px";
  }

  function render(top) {
    dice.innerText = top;
  }

  async function start() {
    if (running) return;

    running = true;
    document.getElementById("startBtn").disabled = true;

    for (let i = 0; i < steps.length; i++) {
      moveTo(steps[i].pos);
      render(steps[i].top);

      await new Promise(r => setTimeout(r, 700));
    }
  }

  function reset() {
    running = false;
    document.getElementById("startBtn").disabled = false;

    moveTo("A2");
    render(5);
  }

  // inicial
  moveTo("A2");
  render(5);
</script>

</body>
</html>
