<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Dado no Tabuleiro</title>

<style>
  body {
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    margin-top: 40px;
  }

  .board {
    display: grid;
    grid-template-columns: repeat(3, 100px);
    grid-template-rows: repeat(3, 100px);
    gap: 5px;
    position: relative;
  }

  .cell {
    border: 2px solid #333;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
  }

  .dice {
    width: 60px;
    height: 60px;
    background: #fff;
    border: 2px solid black;
    border-radius: 10px;
    position: absolute;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    transition: all 0.6s ease;
  }

  .controls {
    position: absolute;
    top: 340px;
  }

  button {
    padding: 10px 15px;
    font-size: 16px;
    cursor: pointer;
  }
</style>
</head>

<body>

<div>
  <div class="board" id="board"></div>
  <div class="controls">
    <button onclick="start()">Iniciar movimento</button>
  </div>
</div>

<script>
  const board = document.getElementById("board");

  const cols = ["A", "B", "C"];
  const rows = [1, 2, 3];

  // Criar tabuleiro
  rows.forEach(r => {
    cols.forEach(c => {
      const cell = document.createElement("div");
      cell.className = "cell";
      cell.id = c + r;
      cell.innerText = c + r;
      board.appendChild(cell);
    });
  });

  // Criar dado
  const dice = document.createElement("div");
  dice.className = "dice";
  board.appendChild(dice);

  // Estado inicial do dado
  let diceState = {
    top: 5,
    bottom: 2,
    front: 1,
    back: 6,
    left: 3,
    right: 4
  };

  // Caminho com valores esperados no topo
  const path = [
    { pos: "A2", top: 5 },
    { pos: "B2", top: 3 },
    { pos: "B1", top: 1 },
    { pos: "C1", top: 2 },
    { pos: "C2", top: 3 },
    { pos: "C3", top: 5 }
  ];

  function getCellPosition(cellId) {
    const cell = document.getElementById(cellId);
    const rect = cell.getBoundingClientRect();
    const boardRect = board.getBoundingClientRect();

    return {
      left: rect.left - boardRect.left + 20,
      top: rect.top - boardRect.top + 20
    };
  }

  function renderDice() {
    dice.innerText = diceState.top;
  }

  function moveTo(cellId) {
    const pos = getCellPosition(cellId);
    dice.style.left = pos.left + "px";
    dice.style.top = pos.top + "px";
  }

  // Movimentos físicos do dado
  function rollRight() {
    let t = diceState.top;
    diceState.top = diceState.left;
    diceState.left = diceState.bottom;
    diceState.bottom = diceState.right;
    diceState.right = t;
  }

  function rollLeft() {
    let t = diceState.top;
    diceState.top = diceState.right;
    diceState.right = diceState.bottom;
    diceState.bottom = diceState.left;
    diceState.left = t;
  }

  function rollForward() {
    let t = diceState.top;
    diceState.top = diceState.back;
    diceState.back = diceState.bottom;
    diceState.bottom = diceState.front;
    diceState.front = t;
  }

  function rollBackward() {
    let t = diceState.top;
    diceState.top = diceState.front;
    diceState.front = diceState.bottom;
    diceState.bottom = diceState.back;
    diceState.back = t;
  }

  // Sequência ajustada (considerando a lógica do post)
  const moves = [
    () => rollLeft(),    // A2 -> B2
    () => rollForward(), // B2 -> B1
    () => rollLeft(),    // B1 -> C1
    () => rollBackward(),// C1 -> C2
    () => rollBackward() // C2 -> C3
  ];

  async function start() {
    for (let i = 0; i < path.length; i++) {
      moveTo(path[i].pos);
      renderDice();

      await new Promise(r => setTimeout(r, 700));

      if (i < moves.length) {
        moves[i]();
      }
    }
  }

  // posição inicial
  moveTo("A2");
  renderDice();
</script>

</body>
</html>
